<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nicholas Lie — Projects</title>
    <meta name="description" content="Proyek dan aplikasi web oleh Nicholas Lie, termasuk KPR Smart Dashboard — kalkulator KPR untuk skema perbankan Indonesia." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9242567842673294"
      crossorigin="anonymous"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0f172a);
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 640px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 40px;
        backdrop-filter: blur(12px);
      }
      h1 { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.02em; }
      .subtitle { color: #94a3b8; margin-top: 6px; font-weight: 500; }
      h2 {
        font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em;
        color: #64748b; margin: 32px 0 14px; font-weight: 700;
      }
      a.project {
        display: flex; align-items: center; justify-content: space-between;
        gap: 16px; text-decoration: none; color: inherit;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px; padding: 18px 20px; transition: all 0.15s ease;
      }
      a.project:hover { background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.4); transform: translateY(-1px); }
      .project .name { font-weight: 700; font-size: 1.05rem; }
      .project .desc { color: #94a3b8; font-size: 0.85rem; margin-top: 3px; }
      .project .arrow { font-size: 1.4rem; color: #38bdf8; flex-shrink: 0; }
      footer { margin-top: 32px; color: #64748b; font-size: 0.8rem; text-align: center; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Nicholas Lie</h1>
      <p class="subtitle">Web projects &amp; tools</p>

      <h2>Projects</h2>
      <a class="project" href="/kalkulator-kpr/">
        <span>
          <span class="name">KPR Smart Dashboard</span>
          <span class="desc">Kalkulator KPR dengan simulasi bunga fixed berjenjang, biaya akad, dan kalender pembayaran untuk skema perbankan Indonesia.</span>
        </span>
        <span class="arrow">&rarr;</span>
      </a>

      <footer>&copy; 2026 Nicholas Lie</footer>
    </main>
  </body>
</html>
